name: Scrape NYC Events

on:
  schedule:
    # 2 AM Eastern (UTC-4 in summer / UTC-5 in winter)
    # Using 6 AM UTC which = 2 AM EDT (summer). In winter it runs at 1 AM EST — close enough.
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual runs from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          # Direct DB URL — works from local Mac (IPv6). Fails on GitHub runners (IPv6-only host).
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # REST API fallback (HTTPS/IPv4) — used automatically when psycopg2 can't connect.
          # Get SUPABASE_API_URL from the Supabase project URL (e.g. https://xxx.supabase.co)
          # Get SUPABASE_ANON_KEY from Supabase → Settings → API → anon public key
          SUPABASE_API_URL: ${{ secrets.SUPABASE_API_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
          SEATGEEK_CLIENT_SECRET: ${{ secrets.SEATGEEK_CLIENT_SECRET }}
        run: python main.py -v

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: logs/
          retention-days: 7
