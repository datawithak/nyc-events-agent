name: Scrape NYC Events

on:
  schedule:
    # 2 AM Eastern (UTC-4 in summer / UTC-5 in winter)
    # Using 6 AM UTC which = 2 AM EDT (summer). In winter it runs at 1 AM EST — close enough.
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual runs from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          # Direct DB URL (local / IPv6-capable hosts)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # Transaction Pooler URL (IPv4, required for GitHub-hosted runners).
          # Get from Supabase → Settings → Database → Connection string → Transaction pooler.
          # If left unset the scraper auto-derives it from SUPABASE_URL (us-east-1 assumed).
          SUPABASE_POOLER_URL: ${{ secrets.SUPABASE_POOLER_URL }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
          SEATGEEK_CLIENT_SECRET: ${{ secrets.SEATGEEK_CLIENT_SECRET }}
        run: python main.py -v

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: logs/
          retention-days: 7
